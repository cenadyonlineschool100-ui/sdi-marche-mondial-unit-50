name: Deploy to PythonAnywhere

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to PythonAnywhere
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Option A: deploy over SSH (recommended for paid PythonAnywhere accounts)
      - name: Start SSH agent
        if: ${{ secrets.PA_SSH_PRIVATE_KEY != '' }}
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.PA_SSH_PRIVATE_KEY }}

      - name: Deploy on PythonAnywhere via SSH
        if: ${{ secrets.PA_SSH_PRIVATE_KEY != '' }}
        env:
          SSH_USER: ${{ secrets.PA_SSH_USER }}
          SSH_HOST: ${{ secrets.PA_SSH_HOST }}
          REMOTE_DIR: ${{ secrets.PA_SSH_REMOTE_DIR }}
          VENV_PATH: ${{ secrets.PA_VENV_PATH }}
          BRANCH: master
        run: |
          SSH_HOST=${SSH_HOST:-ssh.pythonanywhere.com}
          REMOTE_DIR=${REMOTE_DIR:-/home/${SSH_USER}/sdi_site/sdi_market}
          VENV_PATH=${VENV_PATH:-/home/${SSH_USER}/.virtualenvs/sdi_venv}

          echo "🛠️  Running remote deploy on ${SSH_USER}@${SSH_HOST}:${REMOTE_DIR}"
          ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} "
            set -e
            cd ${REMOTE_DIR}
            git fetch origin
            git checkout ${BRANCH} || true
            git pull origin ${BRANCH}
            if [ -f ${VENV_PATH}/bin/activate ]; then
              source ${VENV_PATH}/bin/activate
            fi
            pip install --upgrade pip setuptools wheel || true
            pip install -r requirements.txt || true
            python manage.py migrate --noinput || true
            python manage.py collectstatic --noinput || true
          "

      # Option B: if you cannot use SSH, just trigger a webapp reload via PythonAnywhere API
      - name: Reload PythonAnywhere webapp via API
        if: ${{ secrets.PA_API_TOKEN != '' && secrets.PA_USERNAME != '' }}
        env:
          PA_USERNAME: ${{ secrets.PA_USERNAME }}
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
        run: |
          set -e
          DOMAIN=${PA_USERNAME}.pythonanywhere.com
          echo "🔁 Triggering reload for ${DOMAIN}"
          curl -s -X POST \
            -H "Authorization: Token ${PA_API_TOKEN}" \
            https://www.pythonanywhere.com/api/v0/user/${PA_USERNAME}/webapps/${DOMAIN}/reload/ || true

      - name: Done
        run: echo "✅ Deploy job finished"

# Required repository secrets (add in GitHub Settings > Secrets and variables > Actions):
# - PA_SSH_PRIVATE_KEY : private SSH key (optional, for SSH-based deploy)
# - PA_SSH_USER        : your PythonAnywhere username (for SSH)
# - PA_SSH_HOST        : optional SSH host, default ssh.pythonanywhere.com
# - PA_SSH_REMOTE_DIR  : remote path to project, e.g. /home/youruser/sdi_site/sdi_market
# - PA_VENV_PATH       : path to virtualenv on PythonAnywhere, e.g. /home/youruser/.virtualenvs/sdi_venv
# - PA_API_TOKEN       : PythonAnywhere API token (optional, used to reload webapp)
# - PA_USERNAME        : PythonAnywhere username (used with API token)
