version: '3.9'

services:
  web:
    build: .
    command: sh -c "python sdi_market/manage.py migrate --noinput && python sdi_market/manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 sdi_market.asgi:application"
    volumes:
      - static_volume:/app/sdi_market/staticfiles
      - media_volume:/app/sdi_market/media
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sdistore
      POSTGRES_USER: sdistore
      POSTGRES_PASSWORD: yF97NARKLRB4ObN6YiFxtwEI
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdistore"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/sdi_market/staticfiles:ro
      - media_volume:/app/sdi_market/media:ro

volumes:
  db_data:
  redis_data:
  static_volume:
  media_volume:
