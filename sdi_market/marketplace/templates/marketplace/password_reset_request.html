{% extends 'marketplace/base.html' %}
{% block extra_css %}
<style>
.password-reset-page {
    min-height: calc(100vh - 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
}
.password-reset-card {
    max-width: 520px;
    width: 100%;
    background: rgba(255,255,255,0.96);
    border: 1px solid rgba(30, 64, 175, 0.16);
    border-radius: 28px;
    box-shadow: 0 28px 80px rgba(15, 23, 42, 0.12);
    padding: 32px 28px;
    backdrop-filter: blur(18px);
}
.password-reset-card h2 {
    margin-bottom: 18px;
    color: #0f172a;
    font-size: clamp(2rem, 2.4vw, 2.4rem);
}
.password-reset-card p {
    color: #475569;
    line-height: 1.6;
    margin-bottom: 18px;
}
.form-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
}
.form-group label {
    font-weight: 600;
    color: #334155;
}
.form-control {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid rgba(148, 163, 184, 0.28);
    background: #f8fafc;
    color: #0f172a;
}
.button-primary {
    width: 100%;
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
}
.small-link {
    color: #2563eb;
    font-weight: 600;
}
</style>
{% endblock %}

{% block content %}
<div class="password-reset-page">
    <div class="password-reset-card">
        <h2>Mot de passe oublié</h2>
        <p>Entrez votre adresse e-mail pour recevoir un lien de réinitialisation de mot de passe.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Adresse e-mail</label>
                <input class="form-control" type="email" id="email" name="email" required autocomplete="email">
            </div>
            <button type="submit" class="button-primary">Envoyer le lien</button>
        </form>
        <p class="login-footer">Retour à la <a href="{% url 'login' %}" class="small-link">connexion</a>.</p>
    </div>
</div>
{% endblock %}
