{% extends 'marketplace/base.html' %}

{% block title %}Live (Jitsi) - {{ course.title }}{% endblock %}

{% block content %}
<div class="section-header">
    <h2>Salle Live — Jitsi</h2>
    <p>Cette vignette ouvre une salle Jitsi publique intégrée via iframe.</p>
</div>

<div style="width:100%; height:70vh;">
    <iframe allow="camera; microphone; fullscreen; display-capture" src="https://meet.jit.si/{{ jitsi_room }}" style="width:100%; height:100%; border:0; border-radius:6px;" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-presentation"></iframe>
</div>

{% endblock %}
