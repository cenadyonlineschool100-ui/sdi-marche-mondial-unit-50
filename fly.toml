# Fly.io configuration for SDI Store

app = "sdi-store"
primary_region = "ord"

[env]
  DJANGO_SETTINGS_MODULE = "sdi_market.settings"
  PYTHONUNBUFFERED = "1"
  PORT = "8000"

[[services]]
  internal_port = 8000
  processes = ["app"]

  [services.concurrency]
    hard_limit = 100
    soft_limit = 80

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_options]
    compress = true

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = 10000
    timeout = 2000

[[vm]]
  memory = "512mb"
  cpus = 1
  cpu_kind = "shared"

[deploy]
  release_command = "python sdi_market/manage.py migrate --noinput && python sdi_market/manage.py collectstatic --noinput"

[[statics]]
  guest_path = "/app/sdi_market/staticfiles"
  url_prefix = "/static/"
